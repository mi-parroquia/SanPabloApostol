function App() {

const compartirImagen = async () => {
  try {
    if (!imagenModal) return;

    // Intentar compartir como archivo
    try {
      const response = await fetch(imagenModal);
      const blob = await response.blob();
      const file = new File([blob], "aviso.jpg", { type: blob.type });

      if (navigator.canShare && navigator.canShare({ files: [file] })) {
        await navigator.share({
          files: [file],
          title: "Aviso Parroquial",
          text: "Te comparto este aviso"
        });
        return;
      }
    } catch (e) {
      console.warn("No se pudo convertir a archivo");
    }

    // Compartir como link
    if (navigator.share) {
      await navigator.share({
        title: "Aviso Parroquial",
        text: "Mira este aviso",
        url: imagenModal
      });
      return;
    }

    // Fallback copiar
    await navigator.clipboard.writeText(imagenModal);
    alert("Link copiado");

  } catch (err) {
    console.error(err);
    alert("No se pudo compartir");
  }
};

  React.useEffect(()=>{
    const handleBeforeInstallPrompt=(e)=>{
      e.preventDefault();
      setDeferredPrompt(e);
      setMostrarBtnPWA(true);
    };
    window.addEventListener("beforeinstallprompt",handleBeforeInstallPrompt);
    return ()=> window.removeEventListener("beforeinstallprompt",handleBeforeInstallPrompt);
  },[]);

  const instalarApp=async()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    const choice=await deferredPrompt.userChoice;
    if(choice.outcome==="accepted") setMostrarBtnPWA(false);
    setDeferredPrompt(null);
  };

  React.useEffect(()=>{
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('./sw.js').then(reg=>{
        reg.addEventListener('updatefound',()=>{
          const newSW=reg.installing;
          newSW.addEventListener('statechange',()=>{
            if(newSW.state==='installed' && navigator.serviceWorker.controller){
              setActualizacionDisponible(true);
            }
          });
        });
      });

      navigator.serviceWorker.addEventListener('message', event=>{
        if(event.data?.type==='NEW_VERSION_AVAILABLE'){
          setActualizacionDisponible(true);
        }
      });
    }
  },[]);

  return (
    <div className="max-w-md mx-auto min-h-screen text-white p-2">
      
      {mostrarBtnPWA && (
        <div className="flex justify-center mb-4 mt-2">
          <button onClick={instalarApp} className="bg-yellow-500 btn-hover text-black font-bold py-2 px-6 rounded-lg shadow-lg">📲 Instalar App</button>
        </div>
      )}

      {actualizacionDisponible && (
        <div className="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-black px-4 py-2 rounded shadow-lg z-50 flex items-center gap-3">
          Nueva versión disponible
          <button className="bg-black text-white px-2 py-1 rounded" onClick={()=>window.location.reload()}>Actualizar</button>
        </div>
      )}

      {/* HEADER */}
      <div className="backdrop-blur-md bg-white/20 p-6 flex items-center shadow-lg fade-up rounded-xl mb-3">
        <img src="./SanPablito.png" className="w-16 h-16 mr-4 rounded-full bg-white p-1"/>
        <div>
          <h1 className="text-xl font-extrabold leading-tight drop-shadow-lg">Parroquia de San Pablo Apóstol</h1>
          <p className="text-sm text-yellow-300">II Vicaria Diócesis de Texcoco A.R</p>
        </div>
      </div>

      {/* AVISOS */}
      <div className="p-3 fade-up" style={{animationDelay:"0.2s"}}>
        <h2 className="font-bold mb-2 text-center text-lg">Avisos Parroquiales</h2>
        <div className="flex justify-center">
          <img src={imagenesAvisos[0]} className="w-full max-w-md aspect-[3/4] object-contain rounded-lg shadow-lg cursor-pointer" onClick={()=>setImagenModal(imagenesAvisos[0])}/>
        </div>
      </div>

      {/* CONTENIDO */}
      <div className="p-3 space-y-4 fade-up" style={{animationDelay:"0.4s"}}>
        
        {/* ANUNCIO */}
        <div className="bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500 text-white rounded-2xl p-6 shadow-xl highlight-glow">
          <h2 className="font-extrabold text-2xl mb-3 text-center">✨ ¡Aviso! ✨</h2>
<p className="text-lg font-semibold text-center mb-2">
  La Parroquia informa que el día <b> 29 de marzo de 2026</b>, con motivo del Domingo de Ramos, se suspende la celebración de la Santa Misa de 8:00 a.m. en el templo parroquial.
</p>

<p className="text-center mb-2">
  En su lugar, se comenzará con la solemne procesión que dará inicio a las 12:00 p.m. en la capilla de San José, con la cual comenzamos la Semana Santa.
</p>

<div className="mt-4 bg-white/20 backdrop-blur-md rounded-xl p-3">
  <p><span className="font-bold">📍 Punto de salida:</span> Capilla de San José</p>
  <p><span className="font-bold">📅 Fecha:</span> 29 de marzo de 2026</p>
  <p><span className="font-bold">⏰ Hora:</span> 12:00 p.m.</p>
</div>

<p className="text-center mt-4 italic">
  "¡Bendito el que viene en nombre del Señor!” (Mateo 21, 9)
</p>

<p className="text-center mt-2 font-semibold">
  Se invita a todos los fieles a participar con fe y devoción.
</p>
        </div>

       

        {/* PASTORALES */}
        <div>
          <h2 className="font-bold mb-3 text-lg text-center">Pastorales</h2>
          <div className="grid grid-cols-2 gap-3">
            {pastorales.map((p,i)=>(
              <a key={i} href={p.link}>
                <div className="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden shadow-lg card-hover cursor-pointer">
                  <img src={p.img} className="w-full h-32 object-cover"/>
                  <div className="p-2 text-center font-semibold">{p.nombre}</div>
                </div>
              </a>
            ))}
          </div>
        </div>

        {/* IMAGEN DEL TEMPLO */}
        <div className="bg-white/20 backdrop-blur-md rounded-2xl p-2 shadow-lg fade-up">
          <h2 className="font-bold mb-2 text-center">Imagen del Templo</h2>
