<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parroquia San Pablo</title>

  <!-- Manifest para PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0b1f3a">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      background: linear-gradient(to bottom, #0b1f3a, #1e3a5f);
    }

    .fade-up {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.8s forwards;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .bounce {
      animation: bounce 1.2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }
  </style>
</head>
<body>

<div class="flex justify-center mb-4 mt-2">
  <button id="btnInstalar" 
          class="bg-yellow-500 hover:bg-yellow-600 text-black font-bold py-2 px-6 rounded-lg shadow-lg transition-all duration-300 hidden">
    📲 Instalar App
  </button>
</div>

<div id="root"></div>

<script type="text/babel">

function App() {
  const [mostrarAviso, setMostrarAviso] = React.useState(false);
  const imagenesAvisos = ["./Confesionescarta.png"];
  const [imagenModal, setImagenModal] = React.useState(null);

  return (
    <div className="max-w-md mx-auto min-h-screen text-white">

      {/* HEADER */}
      <div className="backdrop-blur-md bg-white/10 p-4 flex items-center shadow-lg fade-up">
        <img 
          src="./SanPablito.png" 
          className="w-10 h-10 mr-3 rounded-full bg-white p-1"
        />

        <div>
          <h1 className="text-xs font-bold leading-tight">
            Parroquia de San Pablo Apóstol
          </h1>
          <p className="text-[10px]">
            II Vicaria Diócesis de Texcoco A.R
          </p>
        </div>
      </div>

      {/* AVISOS */}
      <div className="p-3 fade-up" style={{ animationDelay: "0.2s" }}>
        <h2 className="font-bold mb-2 text-center">Avisos Parroquiales</h2>

        {imagenesAvisos.length === 1 ? (
          <div className="flex justify-center">
            <img
              src={imagenesAvisos[0]}
              className="w-full max-w-md aspect-[3/4] object-contain rounded-lg shadow-lg cursor-pointer"
              onClick={() => setImagenModal(imagenesAvisos[0])}
            />
          </div>
        ) : (
          <div className="flex overflow-x-auto gap-3">
            {imagenesAvisos.map((img, i) => (
              <img
                key={i}
                src={img}
                className="w-60 h-40 object-cover rounded-lg shadow-lg cursor-pointer flex-shrink-0"
                onClick={() => setImagenModal(img)}
              />
            ))}
          </div>
        )}
      </div>

      {/* CONTENIDO */}
      <div className="p-3 space-y-4 fade-up" style={{animationDelay: "0.4s"}}>

        {/* ANUNCIO */}
        <div className="bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500 text-white rounded-2xl p-6 shadow-xl animate-pulse">
          <h2 className="font-extrabold text-2xl mb-3 text-center">
            ✨ ¡Aviso! ✨
          </h2>

          <p className="text-lg font-semibold text-center mb-2">
            El Domingo de Ramos no hay misa de 8 a.m en la Parroquia, se hará la Procesión a las 10 a.m iniciando en la capilla de San José
          </p>

          <p className="text-center mb-2">
            Acompáñanos en este recorrido lleno de fe y tradición.
          </p>

          <div className="mt-4 bg-white/20 backdrop-blur-md rounded-xl p-3">
            <p><span className="font-bold">📍 Punto de salida:</span> San José</p>
            <p><span className="font-bold">📅 Fecha:</span> (Agrega aquí la fecha)</p>
            <p><span className="font-bold">⏰ Hora:</span> (Agrega aquí la hora)</p>
          </div>

          <p className="text-center mt-4 font-semibold">
            ¡Te esperamos! 🙌
          </p>
        </div>

        {/* HORARIOS */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Horarios</h2>
          <p><b>Misa:</b> Domingo 8:00, 12:00, 19:00 HRS</p>
          <p><b>Confesiones y Hora Santa:</b> Jueves 5:00 PM</p>
          <p><b>Misa diaria:</b> 8:00 AM</p>
        </div>

        {/* PASTORALES */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Pastorales</h2>
          <ul className="list-disc ml-5">
            <li>Pastoral Juvenil</li>
            <li>Pastoral Familiar</li>
            <li>Catequesis</li>
          </ul>
        </div>

        {/* IMAGEN */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-2 shadow-lg fade-up" style={{animationDelay:"0.6s"}}>
          <h2 className="font-bold mb-2 text-center">Imagen del Templo</h2>
          <img 
            src="./iglesia1.jpg" 
            className="w-full h-56 object-cover rounded-xl shadow-lg"
          />
        </div>

        {/* ✅ INFORMACIÓN (ARREGLADO) */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Información</h2>
          <p>Dirección: Calle Hidalgo esquina con Benito Juárez, San Pablito Calmimilolco Chiconcuac México C.P 56270</p>
          <p>Teléfono:</p>
        </div>

        {/* ✅ MAPA (ARREGLADO) */}
        <div className="bg-white/10 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Ubicación</h2>
          <iframe src="https://www.google.com/maps/d/embed?mid=1YIT-P8x7znCqBuBpO6VtmfxikfrU2SY&ehbc=2E312F&noprof=1" width="300" height="290"></iframe>
        </div>

      </div>

      {/* MODAL */}
      {imagenModal && (
        <div className="fixed inset-0 bg-black z-50 flex flex-col items-center justify-center">
          <img 
            src={imagenModal}
            className="max-h-[80vh] max-w-[90vw] object-contain rounded-lg shadow-2xl mb-4"
          />
          <button onClick={() => setImagenModal(null)} className="bg-red-600 text-white px-4 py-2 rounded">X</button>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
