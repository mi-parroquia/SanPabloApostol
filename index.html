<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parroquia San Pablo</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0b1f3a">

<!-- Tailwind + React + Babel -->
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ICONOS GRATIS Y SEGUROS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body { background: linear-gradient(to bottom, #0b1f3a, #1e3a5f); font-family: 'Inter', sans-serif; }
.fade-up { opacity:0; transform:translateY(20px); animation:fadeUp 0.8s forwards; }
@keyframes fadeUp { to {opacity:1; transform:translateY(0);} }
.highlight-glow { animation:glow 1.5s ease-in-out; border-radius:1rem; }
@keyframes glow { 0%,100%{box-shadow:0 0 12px rgba(255,255,0,0.3);} 50%{box-shadow:0 0 24px rgba(255,255,0,0.6);} }
.card-hover:hover{ transform: scale(1.05); transition: 0.3s;}
.btn-hover:hover{ background-color:#facc15; transition:0.3s;}
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
function App() {
  const [imagenModal,setImagenModal]=React.useState(null);
  const [deferredPrompt,setDeferredPrompt]=React.useState(null);
  const [mostrarBtnPWA,setMostrarBtnPWA]=React.useState(false);
  const [actualizacionDisponible,setActualizacionDisponible]=React.useState(false);

  const imagenesAvisos = ["./Confesionescarta.png"];

  // 🔹 IMÁGENES ACTUALIZADAS
  const pastorales = [
    { nombre:"Misiones", img:"https://images.unsplash.com/photo-1529078155058-5d716f45d604?q=80&w=800", link:"/misiones.html" },
    { nombre:"Catequesis", img:"https://images.unsplash.com/photo-1503676260728-1c00da094a0b?q=80&w=800", link:"/catequesis.html" },
    { nombre:"Familiar", img:"https://images.unsplash.com/photo-1511895426328-dc8714191300?q=80&w=800", link:"/familiar.html" },
    { nombre:"Juvenil", img:"https://images.unsplash.com/photo-1522202176988-66273c2fd55f?q=80&w=800", link:"/juvenil.html" }
  ];

  React.useEffect(()=>{
    const handleBeforeInstallPrompt=(e)=>{
      e.preventDefault();
      setDeferredPrompt(e);
      setMostrarBtnPWA(true);
    };
    window.addEventListener("beforeinstallprompt",handleBeforeInstallPrompt);
    return ()=> window.removeEventListener("beforeinstallprompt",handleBeforeInstallPrompt);
  },[]);

  const instalarApp=async()=>{
    if(!deferredPrompt) return;
    deferredPrompt.prompt();
    const choice=await deferredPrompt.userChoice;
    if(choice.outcome==="accepted") setMostrarBtnPWA(false);
    setDeferredPrompt(null);
  };

  React.useEffect(()=>{
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('/sw.js').then(reg=>{
        reg.addEventListener('updatefound',()=>{
          const newSW=reg.installing;
          newSW.addEventListener('statechange',()=>{
            if(newSW.state==='installed' && navigator.serviceWorker.controller){
              setActualizacionDisponible(true);
            }
          });
        });
      });

      navigator.serviceWorker.addEventListener('message', event=>{
        if(event.data?.type==='NEW_VERSION_AVAILABLE'){
          setActualizacionDisponible(true);
        }
      });
    }
  },[]);

  return (
    <div className="max-w-md mx-auto min-h-screen text-white p-2">
      
      {mostrarBtnPWA && (
        <div className="flex justify-center mb-4 mt-2">
          <button onClick={instalarApp} className="bg-yellow-500 btn-hover text-black font-bold py-2 px-6 rounded-lg shadow-lg">📲 Instalar App</button>
        </div>
      )}

      {actualizacionDisponible && (
        <div className="fixed bottom-4 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-black px-4 py-2 rounded shadow-lg z-50 flex items-center gap-3">
          Nueva versión disponible
          <button className="bg-black text-white px-2 py-1 rounded" onClick={()=>window.location.reload()}>Actualizar</button>
        </div>
      )}

      {/* HEADER */}
      <div className="backdrop-blur-md bg-white/20 p-6 flex items-center shadow-lg fade-up rounded-xl mb-3">
        <img src="./SanPablito.png" className="w-16 h-16 mr-4 rounded-full bg-white p-1"/>
        <div>
          <h1 className="text-xl font-extrabold leading-tight drop-shadow-lg">Parroquia de San Pablo Apóstol</h1>
          <p className="text-sm text-yellow-300">II Vicaria Diócesis de Texcoco A.R</p>
        </div>
      </div>

      {/* AVISOS */}
      <div className="p-3 fade-up" style={{animationDelay:"0.2s"}}>
        <h2 className="font-bold mb-2 text-center text-lg">Avisos Parroquiales</h2>
        <div className="flex justify-center">
          <img src={imagenesAvisos[0]} className="w-full max-w-md aspect-[3/4] object-contain rounded-lg shadow-lg cursor-pointer" onClick={()=>setImagenModal(imagenesAvisos[0])}/>
        </div>
      </div>

      {/* CONTENIDO */}
      <div className="p-3 space-y-4 fade-up" style={{animationDelay:"0.4s"}}>
        
        {/* ANUNCIO */}
        <div className="bg-gradient-to-r from-yellow-400 via-orange-500 to-red-500 text-white rounded-2xl p-6 shadow-xl highlight-glow">
          <h2 className="font-extrabold text-2xl mb-3 text-center">✨ ¡Aviso! ✨</h2>
<p className="text-lg font-semibold text-center mb-2">
  La Parroquia informa que el día <b> 29 de marzo de 2026</b>, con motivo del Domingo de Ramos, se suspende la celebración de la Santa Misa de 8:00 a.m. en el templo parroquial.
</p>

<p className="text-center mb-2">
  En su lugar, se comenzará con la solemne procesión que dará inicio a las 12:00 p.m. en la capilla de San José, con la cual comenzamos la Semana Santa.
</p>

<div className="mt-4 bg-white/20 backdrop-blur-md rounded-xl p-3">
  <p><span className="font-bold">📍 Punto de salida:</span> Capilla de San José</p>
  <p><span className="font-bold">📅 Fecha:</span> 29 de marzo de 2026</p>
  <p><span className="font-bold">⏰ Hora:</span> 12:00 p.m.</p>
</div>

<p className="text-center mt-4 italic">
  "¡Bendito el que viene en nombre del Señor!” (Mateo 21, 9)
</p>

<p className="text-center mt-2 font-semibold">
  Se invita a todos los fieles a participar con fe y devoción.
</p>
        </div>

       

        {/* PASTORALES */}
        <div>
          <h2 className="font-bold mb-3 text-lg text-center">Pastorales</h2>
          <div className="grid grid-cols-2 gap-3">
            {pastorales.map((p,i)=>(
              <a key={i} href={p.link}>
                <div className="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden shadow-lg card-hover cursor-pointer">
                  <img src={p.img} className="w-full h-32 object-cover"/>
                  <div className="p-2 text-center font-semibold">{p.nombre}</div>
                </div>
              </a>
            ))}
          </div>
        </div>

        {/* IMAGEN DEL TEMPLO */}
        <div className="bg-white/20 backdrop-blur-md rounded-2xl p-2 shadow-lg fade-up">
          <h2 className="font-bold mb-2 text-center">Imagen del Templo</h2>
          <img src="./iglesia1.jpg" className="w-full h-56 object-cover rounded-xl shadow-lg"/>
        </div>

 {/* HORARIOS */}
        <div className="bg-white/20 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2 text-lg">Horarios</h2>
          <p><b>Misa:</b> Domingo 8:00, 12:00, 19:00 HRS</p>
          <p><b>Confesiones y Hora Santa:</b> Jueves 5:00 PM</p>
          <p><b>Misa diaria:</b> 8:00 AM</p>
        </div>


        
        {/* INFORMACIÓN */}
        <div className="bg-white/20 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Información</h2>
          <p>Dirección: Calle Hidalgo esquina con Benito Juárez, San Pablito Calmimilolco Chiconcuac México C.P 56270</p>
          <p>Teléfono:</p>
        </div>

{/* JURAMENTOS */}
<div className="bg-white/20 backdrop-blur-md rounded-2xl p-3 shadow-lg fade-up">
  <h2 className="font-bold mb-3 text-lg text-center">Juramentos</h2>

  <a href="/juramentos.html">
    <div className="bg-white/10 backdrop-blur-md rounded-2xl overflow-hidden shadow-lg card-hover cursor-pointer">
      <img 
        src="https://images.unsplash.com/photo-1504052434569-70ad5836ab65?q=80&w=800" 
        className="w-full h-40 object-cover"
      />
      <div className="p-2 text-center font-semibold italic">
        “Todo lo puedo en Aquel que me fortalece” (Flp 4, 13)
      </div>
    </div>
  </a>
</div>
        
        {/* MAPA */}
        <div className="bg-white/20 backdrop-blur-md rounded-2xl p-4 shadow-lg">
          <h2 className="font-bold mb-2">Ubicación</h2>
          <iframe src="https://www.google.com/maps/d/embed?mid=1YIT-P8x7znCqBuBpO6VtmfxikfrU2SY&ehbc=2E312F&noprof=1" width="300" height="290"></iframe>
        </div>

      </div>

      {/* MODAL */}
      {imagenModal && (
        <div className="fixed inset-0 bg-black bg-opacity-80 z-50 flex flex-col items-center justify-center p-4" onClick={e=>{if(e.target===e.currentTarget) setImagenModal(null);}}>
          <img src={imagenModal} className="max-h-[70vh] max-w-[90vw] object-contain rounded-lg shadow-2xl mb-4"/>
          <div className="flex justify-center gap-4 mt-2 w-full max-w-md">
            <button onClick={async ()=>{
              try{
                if(navigator.share){await navigator.share({url:imagenModal});}
                else{await navigator.clipboard.writeText(imagenModal); alert("Link copiado: "+imagenModal);}
              }catch(err){alert("No se pudo compartir: "+err.message);}
            }} className="flex-1 bg-white text-black py-2 rounded-lg shadow hover:bg-gray-200 transition flex items-center justify-center gap-2">
              <i className="fas fa-share-alt"></i>
              Compartir
            </button>
            <button onClick={()=>setImagenModal(null)} className="flex-1 bg-red-600 text-white py-2 rounded-lg shadow hover:bg-red-700 transition">Cerrar</button>
          </div>
        </div>
      )}

      {/* FOOTER */}
      <footer className="mt-6 text-center text-white text-sm p-4 bg-white/10 backdrop-blur-md rounded-xl shadow-inner leading-relaxed">
        <p>Creado por comunicador parroquial</p>
        <p className="text-yellow-300 mt-1">Ayuda a mejorar la aplicación con tu apoyo económico</p>
      </footer>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js')
  .then(()=>console.log("SW registrado"))
  .catch(err=>console.log("Error SW:",err));
}
</script>

</body>
</html>
